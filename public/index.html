<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный чат</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;font-family:'Segoe UI',sans-serif;color:#fff;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

.login-wrap{background:#18181f;border-radius:16px;padding:32px 28px;width:320px;border:1px solid #2a2a35}
.login-logo{text-align:center;font-size:26px;font-weight:900;margin-bottom:6px;letter-spacing:2px}
.login-logo span{color:#7c5cfc}
.login-sub{text-align:center;font-size:12px;color:#555;margin-bottom:24px}
.login-label{font-size:12px;color:#888;font-weight:700;margin-bottom:6px;display:block}
.login-input{width:100%;background:#0f0f13;border:1px solid #2a2a35;border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;outline:none;margin-bottom:14px;transition:border 0.15s}
.login-input:focus{border-color:#7c5cfc}
.login-input::placeholder{color:#333}
.login-btn{width:100%;padding:13px;background:#7c5cfc;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:1px;transition:all 0.15s}
.login-btn:hover{background:#6a4aee}
.login-err{color:#e74c3c;font-size:12px;text-align:center;margin-top:10px;min-height:18px}

.chat-wrap{display:none;flex-direction:column;width:100%;max-width:680px;height:100vh}

.topbar{background:#18181f;border-bottom:1px solid #2a2a35;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.partner-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0}
.partner-info{flex:1}
.partner-name{font-size:15px;font-weight:800}
.partner-status{font-size:11px;color:#555;margin-top:1px}
.partner-status.online{color:#2ecc71}
.my-name-badge{font-size:11px;font-weight:700;background:#1a1a2e;padding:4px 10px;border-radius:20px;border:1px solid #2a2a35}
.logout-btn{background:transparent;border:1px solid #2a2a35;border-radius:8px;color:#555;padding:6px 10px;cursor:pointer;font-size:12px;transition:all 0.15s}
.logout-btn:hover{border-color:#e74c3c;color:#e74c3c}

.chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:#0f0f13}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:#2a2a35;border-radius:4px}

.day-label{text-align:center;font-size:11px;color:#444;padding:4px 12px;background:#18181f;border-radius:20px;align-self:center;margin:4px 0}

.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:75%}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.msg-row.them{align-self:flex-start}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.bubble-wrap{display:flex;flex-direction:column;gap:2px}
.sender-name{font-size:11px;font-weight:700;margin-bottom:2px}
.me .sender-name{text-align:right}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.them .bubble{background:#18181f;border:1px solid #2a2a35;color:#e0e0e0;border-bottom-left-radius:4px}
.me .bubble{background:#7c5cfc;color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:#444;padding:0 2px}
.me .msg-time{text-align:right}

.typing-indicator{font-size:12px;color:#555;padding:2px 14px;min-height:20px;flex-shrink:0}

.input-area{background:#18181f;border-top:1px solid #2a2a35;padding:10px 14px;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:center}
.chat-input{flex:1;background:#0f0f13;border:1px solid #2a2a35;border-radius:24px;padding:10px 16px;color:#fff;font-size:14px;outline:none;transition:border 0.15s}
.chat-input:focus{border-color:#7c5cfc}
.chat-input::placeholder{color:#333}
.send-btn{width:42px;height:42px;border-radius:50%;background:#7c5cfc;border:none;cursor:pointer;color:#fff;font-size:18px;flex-shrink:0;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.send-btn:hover{background:#6a4aee}
.send-btn:active{transform:scale(0.97)}
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-logo">ЛИЧНЫЙ <span>ЧАТ</span></div>
  <div class="login-sub">Только для своих</div>
  <label class="login-label">Логин</label>
  <input class="login-input" id="l-login" placeholder="Введи логин" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
  <label class="login-label">Пароль</label>
  <input class="login-input" id="l-pass" type="password" placeholder="Введи пароль" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="login-btn" onclick="doLogin()">ВОЙТИ</button>
  <div class="login-err" id="login-err"></div>
</div>

<div class="chat-wrap" id="chat-screen">
  <div class="topbar">
    <div class="partner-avatar" id="p-avatar">F</div>
    <div class="partner-info">
      <div class="partner-name" id="p-name">...</div>
      <div class="partner-status" id="p-status">не в сети</div>
    </div>
    <div class="my-name-badge" id="my-badge"></div>
    <button class="logout-btn" onclick="logout()">Выйти</button>
  </div>

  <div class="chat-body" id="chat-body">
    <div class="day-label">Сегодня</div>
  </div>

  <div class="typing-indicator" id="typing-ind"></div>

  <div class="input-area">
    <div class="input-row">
      <input class="chat-input" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
const socket = io();
let myLogin = '';
let typingTimer = null;

const PARTNER = {'Gulsevar':'Fotih','Fotih':'Gulsevar'};
const COLORS = {'Gulsevar':'#e91e8c','Fotih':'#7c5cfc'};
const INITIALS = {'Gulsevar':'G','Fotih':'F'};

function now(){
  let d=new Date();
  return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
}

function esc(t){
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom(){
  let b=document.getElementById('chat-body');
  setTimeout(()=>{ b.scrollTop=b.scrollHeight; },50);
}

async function doLogin(){
  const login=document.getElementById('l-login').value.trim();
  const password=document.getElementById('l-pass').value;
  if(!login||!password){showErr('Заполни все поля');return;}
  try{
    const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password})});
    const data=await res.json();
    if(data.success){myLogin=data.login;enterChat();}
    else showErr(data.message);
  }catch(e){showErr('Ошибка соединения');}
}

function showErr(msg){document.getElementById('login-err').textContent=msg;}

async function enterChat(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('chat-screen').style.display='flex';

  const partner=PARTNER[myLogin];
  document.getElementById('p-name').textContent=partner;
  document.getElementById('p-avatar').textContent=INITIALS[partner];
  document.getElementById('p-avatar').style.background=COLORS[partner];
  document.getElementById('my-badge').textContent=myLogin;
  document.getElementById('my-badge').style.color=COLORS[myLogin];

  socket.emit('join',myLogin);

  try{
    const res=await fetch('/messages');
    const history=await res.json();
    history.forEach(msg=>renderMsg(msg));
    scrollBottom();
  }catch(e){}

  document.getElementById('msg-input').focus();
}

function logout(){
  myLogin='';
  socket.emit('leave');
  document.getElementById('chat-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('chat-body').innerHTML='<div class="day-label">Сегодня</div>';
  document.getElementById('l-pass').value='';
  document.getElementById('login-err').textContent='';
}

function renderMsg(msg){
  const isMe = msg.from === myLogin;
  const body=document.getElementById('chat-body');
  const row=document.createElement('div');
  row.className='msg-row '+(isMe?'me':'them');
  const color=COLORS[msg.from]||'#7c5cfc';
  const init=INITIALS[msg.from]||msg.from[0].toUpperCase();
  row.innerHTML=`
    <div class="avatar" style="background:${color};color:#fff">${init}</div>
    <div class="bubble-wrap">
      <div class="sender-name" style="color:${color}">${esc(msg.from)}</div>
      <div class="bubble">${esc(msg.text)}</div>
      <div class="msg-time">${esc(msg.time)}</div>
    </div>`;
  body.appendChild(row);
  scrollBottom();
}

function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||!myLogin)return;
  const msg={from:myLogin,text:text,time:now()};
  socket.emit('message',{text,time:msg.time});
  renderMsg(msg);
  inp.value='';
  clearTimeout(typingTimer);
  socket.emit('stop_typing');
}

function onTyping(){
  socket.emit('typing');
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>socket.emit('stop_typing'),1500);
}

document.getElementById('msg-input').addEventListener('input', onTyping);

socket.on('message',(msg)=>{
  if(msg.from!==myLogin) renderMsg(msg);
});

socket.on('online_users',(users)=>{
  if(!myLogin)return;
  const partner=PARTNER[myLogin];
  const online=users.includes(partner);
  const el=document.getElementById('p-status');
  el.textContent=online?'в сети':'не в сети';
  el.className='partner-status '+(online?'online':'');
});

socket.on('typing',(data)=>{
  if(data.from!==myLogin)
    document.getElementById('typing-ind').textContent=data.from+' печатает...';
});

socket.on('stop_typing',()=>{
  document.getElementById('typing-ind').textContent='';
});
</script>
</body>
</html>
